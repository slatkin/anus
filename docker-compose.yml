services:
  anus-web:
    image: ghcr.io/slatkin/anus-web:latest
    # build: .   # uncomment to build from source instead
    ports:
      - "8080:8080"
    environment:
      MINIFLUX_URL: "https://your-miniflux-instance"
      MINIFLUX_API_KEY: "your-api-key"
      DATA_DIR: /data
      CACHE_DIR: /data
      # ALLOW_INVALID_CERTS: "false"
      # CACHE_EXPIRY_DAYS: "30"
      # PORT: "8080"
    volumes:
      - anus-data:/data

volumes:
  anus-data:
