name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update system and install makedeps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed go npm imagemagick webkit2gtk-4.1 github-cli git

      - name: Run tests
        run: go test ./internal/... ./pkg/...

      - name: Build binary
        run: |
          cd frontend && npm ci && VITE_API=wails npm run build && cd ..
          go build -tags webkit2_41,production -ldflags "-s -w" -o anus .
          chmod -R u+w "$(go env GOMODCACHE)" 2>/dev/null || true

      - name: Bundle release tarball
        run: |
          PKGVER=${GITHUB_REF_NAME#v}
          DIST="anus-${PKGVER}"
          mkdir -p "${DIST}/icons"
          cp anus "${DIST}/"
          cp anus.desktop "${DIST}/"
          for sz in 16 32 48 64 128 256; do
            mkdir -p "${DIST}/icons/${sz}x${sz}"
            magick assets/appicon.png -resize "${sz}x${sz}" "${DIST}/icons/${sz}x${sz}/anus.png"
          done
          tar czf "${DIST}-linux-x86_64.tar.gz" "${DIST}"
          echo "TARBALL=${DIST}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"
          echo "PKGVER=${PKGVER}" >> "$GITHUB_ENV"

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "v${PKGVER}" > /dev/null 2>&1 || \
            gh release create "v${PKGVER}" --title "v${PKGVER}" --generate-notes
          gh release upload "v${PKGVER}" "${TARBALL}" --clobber

      - name: Update PKGBUILD sha256 on main
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" packaging/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" packaging/PKGBUILD
          sed -i "s/\"productVersion\": \".*\"/\"productVersion\": \"${PKGVER}\"/" wails.json
          git add packaging/PKGBUILD wails.json
          git diff --staged --quiet || git commit -m "Release v${PKGVER}: update PKGBUILD sha256 and wails.json version"
          git push origin main

      - name: Push to AUR
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/anus.git /tmp/aur-anus \
            --config core.sshCommand="ssh -i ~/.ssh/aur"
          cp packaging/PKGBUILD /tmp/aur-anus/PKGBUILD
          cd /tmp/aur-anus
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git config user.name "github-actions[bot]"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git config user.email "github-actions[bot]@users.noreply.github.com"
          makepkg --printsrcinfo > .SRCINFO
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "Release v${PKGVER}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anus-linux-x86_64
          path: "*.tar.gz"
          if-no-files-found: error
